services:
  - type: web
    name: breathe-esg-api
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python manage.py migrate --noinput && python manage.py seed_data && gunicorn config.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: breathe-esg-db
          property: connectionString
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: PYTHON_VERSION
        value: "3.12"

databases:
  - name: breathe-esg-db
    databaseName: breathe_esg
    plan: free
